<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טריוויה גאוגרפיה וכדורגל</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .hidden { display: none !important; }
        
        /* מסך פתיחה */
        #start-screen { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; }
        .banner-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .banner { width: 180px; padding: 30px; cursor: pointer; font-size: 22px; font-weight: bold; color: white; border-radius: 15px; transition: all 0.3s ease; border: none; }
        .banner:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .basketball { background-color: #ff8c00; opacity: 0.6; cursor: not-allowed; } /* כרגע חסום */
        .football { background-color: #e63946; }

        /* ממשק משחק */
        #game-screen { background: white; padding: 40px; border-radius: 20px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #timer { font-size: 32px; color: #e63946; font-weight: bold; margin-bottom: 10px; }
        #difficulty-label { color: #666; font-size: 18px; }
        #team-name { font-size: 36px; margin: 20px 0; color: #1a1a1a; }
        input { padding: 12px; font-size: 20px; width: 80%; border: 2px solid #ddd; border-radius: 10px; text-align: center; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #e63946; }
        #score-display { margin-top: 20px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>כדורסל או כדורגל?<br>מה שבטוח שאתם טובים בגאוגרפיה!</h1>
        <p>לחצו על הבאנר ותראו כמה הענף שאתם אוהבים משתלב עם ידע גאוגרפי.</p>
        
        <div class="banner-container">
            <button class="banner football" onclick="startGame()">כדורגל</button>
            <button class="banner basketball" title="בקרוב...">כדורסל</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer">20</div>
        <div id="difficulty-label">רמה: קלה (1 נק')</div>
        <div id="team-name">שם הקבוצה</div>
        <input type="text" id="answer-input" placeholder="מאיזו מדינה הקבוצה?" autocomplete="off">
        <div id="score-display">ניקוד: 0</div>
    </div>

    <script>
        const allQuestions = {
            easy: [
                { team: "שאלקה 04", country: "גרמניה" }, { team: "ברוסיה דורטמונד", country: "גרמניה" }, { team: "שטרום גראץ", country: "אוסטריה" },
                { team: "אטאלנטה", country: "איטליה" }, { team: "בארי", country: "איטליה" }, { team: "פארמה", country: "איטליה" },
                { team: "אסטון וילה", country: "אנגליה" }, { team: "וולברהמפטון וונדררס", country: "אנגליה" }, { team: "קריסטל פאלאס", country: "אנגליה" },
                { team: "מכלן", country: "בלגיה" }, { team: "גנק", country: "בלגיה" }, { team: "רויאל אוניון סן-ז'ילואז", country: "בלגיה" },
                { team: "סטנדרד לייז'", country: "בלגיה" }, { team: "קלאב ברוז'", country: "בלגיה" }, { team: "א.ז. אלקמאר", country: "הולנד" },
                { team: "חרונינגן", country: "הולנד" }, { team: "רודה", country: "הולנד" }, { team: "דה חראפסחאפ", country: "הולנד" },
                { team: "ניימכן", country: "הולנד" }, { team: "פנאתינאיקוס", country: "יוון" }, { team: "אולימפיאקוס", country: "יוון" },
                { team: "ריו אבה", country: "פורטוגל" }, { team: "ספורטינג בראגה", country: "פורטוגל" }, { team: "פורטו", country: "פורטוגל" },
                { team: "ניס", country: "צרפת" }, { team: "ליל", country: "צרפת" }, { team: "נאנט", country: "צרפת" },
                { team: "פושקש אקדמיה", country: "הונגריה" }, { team: "פרנצווארוש", country: "הונגריה" }, { team: "רוזנבורג", country: "נורווגיה" },
                { team: "מולדה", country: "נורווגיה" }, { team: "בודה/גלימט", country: "נורווגיה" }, { team: "פנרבחצ'ה", country: "טורקיה" },
                { team: "אנטליהספור", country: "טורקיה" }, { team: "פ.צ. קופנהגן", country: "דנמרק" }, { team: "ארמיניה בילפלד", country: "גרמניה" },
                { team: "לך פוזנן", country: "פולין" }
            ],
            medium: [
                { team: "וולפסבורג", country: "גרמניה" }, { team: "וולפסברג", country: "אוסטריה" }, { team: "ריינדורף אלטאך", country: "אוסטריה" },
                { team: "ריד", country: "אוסטריה" }, { team: "ססואולו", country: "איטליה" }, { team: "קרמונזה", country: "איטליה" },
                { team: "גנואה", country: "איטליה" }, { team: "ספציה", country: "איטליה" }, { team: "מילוול", country: "אנגליה" },
                { team: "ק.פ.ר", country: "אנגליה" }, { team: "שרלרואה", country: "בלגיה" }, { team: "אנדרלכט", country: "בלגיה" },
                { team: "קמבור", country: "הולנד" }, { team: "טלסטאר ספורטקלאב", country: "הולנד" }, { team: "הראקלס אלמלו", country: "הולנד" },
                { team: "גו אהד איגלס", country: "הולנד" }, { team: "לאריסה", country: "יוון" }, { team: "לאנס", country: "צרפת" },
                { team: "מץ", country: "צרפת" }, { team: "בסטיה", country: "צרפת" }, { team: "דנקרק", country: "צרפת" },
                { team: "בודוצ'נוסט פודגוריצה", country: "מונטנגרו" }, { team: "דברצן ו.ס.ק.", country: "הונגריה" }, { team: "לילסטרום", country: "נורווגיה" },
                { team: "פרדריקסטאד", country: "נורווגיה" }, { team: "ברונדבי", country: "דנמרק" }, { team: "מיטיולן", country: "דנמרק" },
                { team: "גרויטר פירט", country: "גרמניה" }, { team: "הולשטיין קיל", country: "גרמניה" }, { team: "יגילוניה ביאליסטוק", country: "פולין" },
                { team: "גאקאאס קטוביצה", country: "פולין" }, { team: "היברניאן", country: "סקוטלנד" }, { team: "סנט מירן", country: "סקוטלנד" }, { team: "אברדין", country: "סקוטלנד" }
            ],
            hard: [
                { team: "דונקסטר רוברס", country: "אנגליה" }, { team: "פורט וייל", country: "אנגליה" }, { team: "ויקם וונדררס", country: "אנגליה" },
                { team: "זולטה ורכם", country: "בלגיה" }, { team: "דנדר", country: "בלגיה" }, { team: "הלמונד ספורט", country: "הולנד" },
                { team: "אמן", country: "הולנד" }, { team: "קיפסיה", country: "יוון" }, { team: "לבדיאקוס", country: "יוון" },
                { team: "סנטה קלרה", country: "פורטוגל" }, { team: "רודז", country: "צרפת" }, { team: "אינטר טורקו", country: "פינלנד" },
                { team: "האמארקאמארטנה", country: "נורווגיה" }, { team: "גנצ'לרבירלי", country: "טורקיה" }, { team: "פרויסן מינסטר", country: "גרמניה" },
                { team: "הפנרפיירדיר", country: "איסלנד" }, { team: "קורונה קיילצה", country: "פולין" }
            ]
        };

        let currentGameQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let timerInterval;
        let timeLeft;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startGame() {
            // בחירת 3 שאלות אקראיות מכל רמה
            const easy3 = shuffle([...allQuestions.easy]).slice(0, 3);
            const medium3 = shuffle([...allQuestions.medium]).slice(0, 3);
            const hard3 = shuffle([...allQuestions.hard]).slice(0, 3);
            
            currentGameQuestions = [...easy3, ...medium3, ...hard3];
            currentIndex = 0;
            score = 0;
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = "ניקוד: 0";
            
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= currentGameQuestions.length) {
                alert("כל הכבוד! סיימת את המשחק.\nהניקוד הסופי שלך: " + score);
                location.reload();
                return;
            }

            const q = currentGameQuestions[currentIndex];
            document.getElementById('team-name').innerText = q.team;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();

            // הגדרת קושי וזמן
            if (currentIndex < 3) {
                timeLeft = 20;
                document.getElementById('difficulty-label').innerText = "רמה: קלה (1 נק')";
            } else if (currentIndex < 6) {
                timeLeft = 15;
                document.getElementById('difficulty-label').innerText = "רמה: בינונית (2 נק')";
            } else {
                timeLeft = 10;
                document.getElementById('difficulty-label').innerText = "רמה: קשה (3 נק')";
            }

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    currentIndex++;
                    showQuestion();
                }
            }, 1000);
        }

        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const userAnswer = this.value.trim();
                const correctAnswer = currentGameQuestions[currentIndex].country;
                
                if (userAnswer === correctAnswer) {
                    if (currentIndex < 3) score += 1;
                    else if (currentIndex < 6) score += 2;
                    else score += 3;
                }
                
                document.getElementById('score-display').innerText = "ניקוד: " + score;
                currentIndex++;
                showQuestion();
            }
        });
    </script>
</body>
</html>
