<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אלופי הגאוגרפיה והכדורגל</title>
    <style>
        :root { --primary-blue: #007bff; --danger-red: #e63946; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; max-width: 700px; width: 95%; }
        h1 { font-size: 28px; line-height: 1.4; margin-bottom: 20px; }
        .btn-start { background: var(--primary-blue); color: white; padding: 20px 40px; font-size: 24px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-start:hover { transform: scale(1.05); background: #0056b3; }
        #timer { font-size: 48px; color: var(--danger-red); font-weight: bold; margin-bottom: 10px; }
        
        /* עיצוב הרמה */
        #difficulty-label { font-size: 20px; font-weight: bold; color: #555; margin-bottom: 5px; text-transform: uppercase; border-bottom: 2px solid #eee; display: inline-block; padding-bottom: 5px; }
        
        #team-name { font-size: 42px; margin: 15px 0 25px 0; color: #1a1a1a; }
        input { padding: 15px; font-size: 22px; width: 80%; border: 3px solid #eee; border-radius: 12px; text-align: center; outline: none; }
        input:focus { border-color: var(--primary-blue); }
        .game-over-title { font-size: 36px; color: var(--danger-red); font-weight: bold; margin-bottom: 15px; }
        .rank-msg { font-size: 22px; color: #333; line-height: 1.4; margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 10px; }
        .final-score { font-size: 50px; color: var(--primary-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen" class="card">
        <h1>תמיד אמרו לכם שכדורגל לא יעזור לכם בחיים? שלשחק פיפא זה בזבוז זמן? בואו להוכיח שאתם אלופים בגאוגרפיה!</h1>
        <button class="btn-start" onclick="startGame()">התחל במשחק</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div id="timer">20</div>
        <div id="difficulty-label"></div>
        <div id="team-name"></div>
        <input type="text" id="answer-input" placeholder="מאיזו מדינה הקבוצה?" autocomplete="off">
        <div id="score-display" style="margin-top:20px; font-weight: bold;">ניקוד: 0</div>
    </div>

    <div id="end-screen" class="card hidden">
        <div class="game-over-title" id="end-reason"></div>
        <div id="correct-answer-reveal" style="margin-bottom: 10px; color: #555; font-size: 20px;"></div>
        <div class="final-score" id="end-score">0</div>
        <div class="rank-msg" id="end-rank-msg"></div>
        <button class="btn-start" onclick="location.reload()">נסה שוב</button>
    </div>

    <script>
        const allQuestions = {
            easy: [{team:"שאלקה 04",country:"גרמניה"},{team:"ברוסיה דורטמונד",country:"גרמניה"},{team:"שטרום גראץ",country:"אוסטריה"},{team:"אטאלנטה",country:"איטליה"},{team:"בארי",country:"איטליה"},{team:"פארמה",country:"איטליה"},{team:"אסטון וילה",country:"אנגליה"},{team:"וולברהמפטון וונדררס",country:"אנגליה"},{team:"קריסטל פאלאס",country:"אנגליה"},{team:"מכלן",country:"בלגיה"},{team:"גנק",country:"בלגיה"},{team:"רויאל אוניון סן-ז'ילואז",country:"בלגיה"},{team:"סטנדרד לייז'",country:"בלגיה"},{team:"קלאב ברוז'",country:"בלגיה"},{team:"א.ז. אלקמאר",country:"הולנד"},{team:"חרונינגן",country:"הולנד"},{team:"רודה",country:"הולנד"},{team:"דה חראפסחאפ",country:"הולנד"},{team:"ניימכן",country:"הולנד"},{team:"פנאתינאיקוס",country:"יוון"},{team:"אולימפיאקוס",country:"יוון"},{team:"ריו אבה",country:"פורטוגל"},{team:"ספורטינג בראגה",country:"פורטוגל"},{team:"פורטו",country:"פורטוגל"},{team:"ניס",country:"צרפת"},{team:"ליל",country:"צרפת"},{team:"נאנט",country:"צרפת"},{team:"פושקש אקדמיה",country:"הונגריה"},{team:"פרנצווארוש",country:"הונגריה"},{team:"רוזנבורג",country:"נורווגיה"},{team:"מולדה",country:"נורווגיה"},{team:"בודה/גלימט",country:"נורווגיה"},{team:"פנרבחצ'ה",country:"טורקיה"},{team:"אנטליהספור",country:"טורקיה"},{team:"פ.צ. קופנהגן",country:"דנמרק"},{team:"ארמיניה בילפלד",country:"גרמניה"},{team:"לך פוזנן",country:"פולין"}],
            medium: [{team:"וולפסבורג",country:"גרמניה"},{team:"וולפסברג",country:"אוסטריה"},{team:"ריינדורף אלטאך",country:"אוסטריה"},{team:"ריד",country:"אוסטריה"},{team:"ססואולו",country:"איטליה"},{team:"קרמונזה",country:"איטליה"},{team:"גנואה",country:"איטליה"},{team:"ספציה",country:"איטליה"},{team:"מילוול",country:"אנגליה"},{team:"ק.פ.ר",country:"אנגליה"},{team:"שרלרואה",country:"בלגיה"},{team:"אנדרלכט",country:"בלגיה"},{team:"קמבור",country:"הולנד"},{team:"טלסטאר ספורטקלאב",country:"הולנד"},{team:"הראקלס אלמלו",country:"הולנד"},{team:"גו אהד איגלס",country:"הולנד"},{team:"לאריסה",country:"יוון"},{team:"לאנס",country:"צרפת"},{team:"מץ",country:"צרפת"},{team:"בסטיה",country:"צרפת"},{team:"דנקרק",country:"צרפת"},{team:"בודוצ'נוסט פודגוריצה",country:"מונטנגרו"},{team:"דברצן ו.ס.ק.",country:"הונגריה"},{team:"לילסטרום",country:"נורווגיה"},{team:"פרדריקסטאד",country:"נורווגיה"},{team:"ברונדבי",country:"דנמרק"},{team:"מיטיולן",country:"דנמרק"},{team:"גרויטר פירט",country:"גרמניה"},{team:"הולשטיין קיל",country:"גרמניה"},{team:"יגילוניה ביאליסטוק",country:"פולין"},{team:"גאקאאס קטוביצה",country:"פולין"},{team:"היברניאן",country:"סקוטלנד"},{team:"סנט מירן",country:"סקוטלנד"},{team:"אברדין",country:"סקוטלנד"}],
            hard: [{team:"דונקסטר רוברס",country:"אנגליה"},{team:"פורט וייל",country:"אנגליה"},{team:"ויקם וונדררס",country:"אנגליה"},{team:"זולטה ורכם",country:"בלגיה"},{team:"דנדר",country:"בלגיה"},{team:"הלמונד ספורט",country:"הולנד"},{team:"אמן",country:"הולנד"},{team:"קיפסיה",country:"יוון"},{team:"לבדיאקוס",country:"יוון"},{team:"סנטה קלרה",country:"פורטוגל"},{team:"רודז",country:"צרפת"},{team:"אינטר טורקו",country:"פינלנד"},{team:"האמארקאמארטנה",country:"נורווגיה"},{team:"גנצ'לרבירלי",country:"טורקיה"},{team:"פרויסן מינסטר",country:"גרמניה"},{team:"הפנרפיירדיר",country:"איסלנד"},{team:"קורונה קיילצה",country:"פולין"}]
        };

        let lastUsed = JSON.parse(localStorage.getItem('lastPlayedTeams')) || [];
        let currentGameQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let timerInterval;
        let isFinished = false;

        function getSmartQuestions(level, count) {
            let pool = allQuestions[level].filter(q => !lastUsed.includes(q.team));
            if (pool.length < count) { pool = [...allQuestions[level]]; lastUsed = []; }
            return pool.sort(() => Math.random() - 0.5).slice(0, count);
        }

        function calculatePoints(index) {
            const pointsMap = { 0:1, 1:1, 2:3, 3:3, 4:5, 5:5, 6:9, 7:10, 8:12 };
            return (index in pointsMap) ? pointsMap[index] : 12 + ((index - 8) * 3);
        }

        function startGame() {
            const q1 = getSmartQuestions('easy', 6);
            const q2 = getSmartQuestions('medium', 5);
            const q3 = getSmartQuestions('hard', 3);
            currentGameQuestions = [...q1, ...q2, ...q3];
            currentGameQuestions.forEach(q => lastUsed.push(q.team));
            localStorage.setItem('lastPlayedTeams', JSON.stringify(lastUsed.slice(-40)));
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= currentGameQuestions.length) { 
                isFinished = true;
                gameOver("הגעת לסוף!"); 
                return; 
            }
            const q = currentGameQuestions[currentIndex];
            document.getElementById('team-name').innerText = q.team;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
            
            // הגדרת טקסט הרמה
            let levelText = "";
            if (currentIndex < 6) levelText = "רמה: קל";
            else if (currentIndex < 11) levelText = "רמה: בינוני";
            else levelText = "רמה: קשה";
            
            document.getElementById('difficulty-label').innerText = levelText;
            document.getElementById('score-display').innerText = `ניקוד: ${score} | שאלה ${currentIndex + 1} מתוך 14 | שווי: ${calculatePoints(currentIndex)} נק'`;
            
            startTimer(currentIndex < 6 ? 20 : (currentIndex < 11 ? 15 : 10));
        }

        function startTimer(time) {
            clearInterval(timerInterval);
            let timeLeft = time;
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) gameOver("נגמר הזמן!");
            }, 1000);
        }

        document.getElementById('answer-input').addEventListener('input', (e) => {
            if (e.target.value.trim() === currentGameQuestions[currentIndex].country) {
                score += calculatePoints(currentIndex);
                currentIndex++;
                setTimeout(showQuestion, 200);
            }
        });

        function gameOver(reason) {
            clearInterval(timerInterval);
            const q = currentGameQuestions[currentIndex];
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            if (currentIndex === 0 && reason !== "נגמר הזמן!") {
                document.getElementById('end-reason').innerText = "לא טוב דודו, תמחק!";
            } else {
                document.getElementById('end-reason').innerText = reason;
            }

            document.getElementById('correct-answer-reveal').innerText = (q && !isFinished) ? `המדינה הנכונה הייתה: ${q.country}` : "";
            document.getElementById('end-score').innerText = score;
            document.getElementById('end-rank-msg').innerText = getRankMessage(score);
        }

        function getRankMessage(s) {
            if (isFinished) return "הגעת לסוף, מכאן זה רק לשמוע את השירים של פיפא 98, ללכת למשחק בליגה השלישית בפורטוגל, להגיע לסיבוב הראשון של הגביע הגרמני ולהתרגש משמות כמו נאק ברדה, צסקא סופיה, פלורה טאלין וראסינג סנטנדר.";
            if (currentIndex === 0) return ""; 
            
            if (s >= 2 && s <= 5) return "אתה צופה בכדורגל אבל כנראה שרק בליגת האלופות.";
            if (s > 5 && s <= 9) return "הליגה האירופית קטנה עליך,יאללה בוא, נוסעים לראות ליגה לאומית.";
            if (s > 9 && s <= 14) return "אתה רוי מקאי, אתה רונאלד דה בור, אתה אגדה הולנדית של שנות ה-2000, בוא זריז יש משחק של טוונטה נגד  ויטסה.";
            if (s > 14 && s <= 19) return "אתה אגדת כדורגל אירופית, אתה אורח כבוד אצל תיירי הנרי ודל פיירו רוצה ממך טיפים, אתה פאגינג גאון.";
            if (s > 19 && s <= 30) return "אתה אגדה חייה, אתה רונלדו השמן לפני שהיה כריסטיאנו, את דודו אווט בלה ליגה ואתה בלתי נגמר.";
            if (s > 30 && s <= 40) return "אתה הפועל תל אביב בגביע אופ\"א עברת כל כך הרבה שאף אחד כבר לא יודע אם הירבה הבאה קיימת.";
            if (s > 40 && s <= 59) return "בטח אתה אומר שהכל היה סטאם, יאפ סטאם.";
            if (s >= 60 && s <= 90) return "אתה כל כך גדול שהדחת קבוצה מאיסלנד ממוקדמות הליגה האזורית.";
            if (s > 90) return "אתה דודו דהן, אתה אייל לחמן, אתה אדם שיודע מי משחק בליגה הקזחית השנייה. אתה סגן אלוף המשחק (למה סגן אתה שואל?, כי לא הגעת לנק' הסיום!!!!)";
            
            return "";
        }
    </script>
</body>
</html>
