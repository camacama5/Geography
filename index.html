<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>משחק גאוגרפיה כדורגל</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        .hidden { display: none; }
        #game-screen { margin-top: 50px; }
        input { padding: 10px; font-size: 1.2em; border-radius: 5px; border: 1px solid #ccc; }
        #timer { font-size: 2em; color: red; font-weight: bold; }
    </style>
</head>
<body>

    <!-- מסך פתיחה -->
    <div id="start-screen">
        <h1>ברוכים הבאים למשחק גאוגרפיה כדורגל!</h1>
        <button onclick="startGame()" style="padding: 15px 30px; font-size: 1.5em; cursor: pointer;">התחל משחק</button>
    </div>

    <!-- מסך משחק -->
    <div id="game-screen" class="hidden">
        <div id="difficulty-label"></div>
        <div id="score-display"></div>
        <div id="timer"></div>
        <h2 id="team-name"></h2>
        <div id="letter-hint"></div>
        <input type="text" id="answer-input" placeholder="מאיזו מדינה הקבוצה?">
    </div>

    <!-- מסך סיום וטבלת מנצחים -->
    <div id="end-screen" class="hidden">
        <div id="leaderboard-section" style="background: #fff; border: 3px solid #333; padding: 20px; margin: 20px auto; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h2 id="end-reason-text" style="color: #d9534f;"></h2>
            <p id="rank-message" style="font-weight: bold; margin: 15px 0;"></p>
            <p>ניקוד סופי: <strong id="final-score-text">0</strong></p>
            
            <div id="save-score-container">
                <input type="text" id="player-name" placeholder="הכנס שם לטבלה">
                <button onclick="submitScore()">שמור ניקוד</button>
            </div>

            <div id="table-container" style="display:none; margin-top: 20px;">
                <h3>טבלת 10 הגדולים</h3>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead><tr style="background: #eee;"><th>שם</th><th>ניקוד</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" style="margin-top: 20px;">שחק שוב ↻</button>
        </div>
    </div>

    <script>
        // כל הפונקציות (startGame, showQuestion, וכו')
        let lastUsed = JSON.parse(localStorage.getItem('lastPlayedTeams')) || [];
        let currentGameQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let timerInterval;
        let isFinished = false;

        // הגדרת השאלות (דוגמה - וודא ש-allQuestions מוגדר אצלך!)
        const allQuestions = {
            easy: [{team: "מכבי תל אביב", country: "ישראל"}, {team: "ריאל מדריד", country: "ספרד"}],
            medium: [{team: "אייאקס", country: "הולנד"}],
            hard: [{team: "לוטון טאון", country: "אנגליה"}]
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSuccess() { playTone(600, 'sine', 0.2); }
        function playFailGeneral() { playTone(200, 'sawtooth', 0.6); }

        function cleanText(text) { return text.replace(/['’]/g, '').trim(); }

        function getSmartQuestions(level, count) {
            let pool = allQuestions[level];
            return pool.sort(() => Math.random() - 0.5).slice(0, count);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentGameQuestions = [...getSmartQuestions('easy', 2), ...getSmartQuestions('medium', 1)];
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= currentGameQuestions.length) { gameOver("הגעת לסוף!"); return; }
            const q = currentGameQuestions[currentIndex];
            document.getElementById('team-name').innerText = q.team;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
            startTimer(15);
        }

        function startTimer(time) {
            clearInterval(timerInterval);
            let timeLeft = time;
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) gameOver("נגמר הזמן!");
            }, 1000);
        }

        document.getElementById('answer-input').addEventListener('input', (e) => {
            const userAnswer = cleanText(e.target.value);
            const correctAnswer = cleanText(currentGameQuestions[currentIndex].country);
            if (userAnswer === correctAnswer) {
                playSuccess();
                score += 10;
                currentIndex++;
                showQuestion();
            }
        });

        function gameOver(reason) {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-reason-text').innerText = reason;
            document.getElementById('final-score-text').innerText = score;
            document.getElementById('rank-message').innerText = "כל הכבוד!";
        }
    </script>
</body>
</html>
