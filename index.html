<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אלופי הגאוגרפיה והכדורגל</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary-blue: #007bff; --danger-red: #e63946; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; max-width: 750px; width: 95%; }
        h1 { font-size: 28px; line-height: 1.4; margin-bottom: 20px; }
        .instructions { font-size: 20px; color: #444; line-height: 1.6; background: #eef6ff; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #d0e3ff; }
        .btn-start { background: var(--primary-blue); color: white; padding: 20px 40px; font-size: 24px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-start:hover { transform: scale(1.05); background: #0056b3; }
        #timer { font-size: 48px; color: var(--danger-red); font-weight: bold; margin-bottom: 10px; }
        #difficulty-label { font-size: 20px; font-weight: bold; color: #555; margin-bottom: 5px; border-bottom: 2px solid #eee; display: inline-block; padding-bottom: 5px; }
        #team-name { font-size: 42px; margin: 25px 0 5px 0; color: #1a1a1a; line-height: 1.2; }
        #letter-hint { font-size: 20px; color: #888; margin-bottom: 20px; font-weight: bold; }
        input { padding: 15px; font-size: 24px; width: 80%; border: 3px solid #eee; border-radius: 12px; text-align: center; outline: none; }
        input:focus { border-color: var(--primary-blue); }
        .game-over-title { font-size: 40px; color: var(--danger-red); font-weight: bold; margin-bottom: 15px; }
        .rank-msg { font-size: 22px; color: #333; line-height: 1.5; margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 10px; border-right: 5px solid var(--primary-blue); text-align: right; }
        .final-score { font-size: 60px; color: var(--primary-blue); font-weight: bold; }
        .score-submission { margin: 25px 0; padding: 20px; border-top: 2px solid #eee; }
        #player-name-input { width: 60%; margin-bottom: 10px; }
        /* תיקון גלילה וגובה למובייל */
        .card { 
            max-height: 85vh; 
            overflow-y: auto; 
            padding: 25px 20px; 
        }
        
        @media (max-width: 600px) {
            .card { width: 95%; padding: 15px; }
            h1 { font-size: 22px; }
            #rank-msg { font-size: 18px !important; line-height: 1.4; }
            input { width: 90% !important; font-size: 18px !important; }
        }
    </style>
</head>
<body>

    <div id="start-screen" class="card">
        <h1>תמיד אמרו לכם שכדורגל לא יעזור לכם בחיים? שלשחק פיפא זה בזבוז זמן? בואו להוכיח שאתם אלופים בגאוגרפיה!</h1>
        <div class="instructions">
            <strong>איך משחקים?</strong> רואים את שם הקבוצה וכותבים את שם המדינה, צדקתם? עוברים אוטומטית לשאלה הבאה, נגמר הזמן ולא ידעתם? מתחילים מהתחלה! שימו לב לכמה אותיות יש בשם המדינה.
        </div>
        <button class="btn-start" onclick="startGame()">התחל במשחק</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div id="timer">20</div>
        <div id="difficulty-label"></div>
        <div id="team-name"></div>
        <div id="letter-hint"></div>
        <input type="text" id="answer-input" placeholder="מאיזו מדינה הקבוצה?" autocomplete="off">
        <div id="score-display" style="margin-top:20px; font-weight: bold; font-size: 18px;">ניקוד: 0</div>
    </div>

    <div id="end-screen" class="card hidden">
        <div class="game-over-title" id="end-reason"></div>
        <div id="correct-answer-reveal" style="margin-bottom: 10px; color: #555; font-size: 22px;"></div>
        <div class="final-score" id="end-score">0</div>
        <div id="end-rank-msg" class="rank-msg"></div>

        <div class="score-submission">
            <h3>שמירת שיא</h3>
            <input type="text" id="player-name-input" placeholder="הכנס שם לשיאים">
            <br>
            <button id="submit-btn" class="btn-start" style="font-size: 18px; padding: 10px 30px;" onclick="submitScore()">שלח תוצאה</button>
        </div>

        <button class="btn-start" onclick="location.reload()">נסה שוב</button>
    </div>

    <script>

        const allQuestions = {
            easy: [
                {team:"שאלקה 04",country:"גרמניה"},{team:"ברוסיה דורטמונד",country:"גרמניה"},{team:"שטרום גראץ",country:"אוסטריה"},{team:"אטאלנטה",country:"איטליה"},{team:"אסוציאציונה ספורטיבה בארי",country:"איטליה"},{team:"פארמה קאלצ'יו 1913",country:"איטליה"},{team:"אסטון וילה",country:"אנגליה"},{team:"וולברהמפטון וונדררס",country:"אנגליה"},{team:"קריסטל פאלאס",country:"אנגליה"},{team:"מכלן",country:"בלגיה"},{team:"גנק",country:"בלגיה"},{team:"רויאל אוניון סן-ז'ילואז",country:"בלגיה"},{team:"סטנדרד לייז'",country:"בלגיה"},{team:"קלאב ברוז'",country:"בלגיה"},{team:"א.ז. אלקמאר",country:"הולנד"},{team:"חרונינגן",country:"הולנד"},{team:"רודה",country:"הולנד"},{team:"דה חראפסחאפ",country:"הולנד"},{team:"ניימכן",country:"הולנד"},{team:"פנאתינאיקוס",country:"יוון"},{team:"אולימפיאקוס",country:"יוון"},{team:"ריו אבה",country:"פורטוגל"},{team:"ספורטינג בראגה",country:"פורטוגל"},{team:"פורטו",country:"פורטוגל"},{team:"אולימפיק גימנסטי קלוב ניס",country:"צרפת"},{team:"ליל – מועדון לספורט אולימפי",country:"צרפת"},{team:"נאנט",country:"צרפת"},{team:"פושקש אקדמיה",country:"הונגריה"},{team:"פרנצווארוש",country:"הונגריה"},{team:"רוזנבורג",country:"נורווגיה"},{team:"מולדה",country:"נורווגיה"},{team:"בודה/גלימט",country:"נורווגיה"},{team:"פנרבחצ'ה",country:"טורקיה"},{team:"אנטליהספור",country:"טורקיה"},{team:"פ.צ. קופנהגן",country:"דנמרק"},{team:"ארמיניה בילפלד",country:"גרמניה"},{team:"לך פוזנן",country:"פולין"},

            ],
            medium: [
                {team:"וולפסבורג",country:"גרמניה"},{team:"וולפסברג",country:"אוסטריה"},{team:"ריינדורף אלטאך",country:"אוסטריה"},{team:"אס.ווה. ריד",country:"אוסטריה"},{team:"ססואולו",country:"איטליה"},{team:"קרמונזה",country:"איטליה"},{team:"גנואה",country:"איטליה"},{team:"ספציה",country:"איטליה"},{team:"מילוול",country:"אנגליה"},{team:"ק.פ.ר",country:"אנגליה"},{team:"שרלרואה",country:"בלגיה"},{team:"אנדרלכט",country:"בלגיה"},{team:"קמבור",country:"הולנד"},{team:"טלסטאר ספורטקלאב",country:"הולנד"},{team:"הראקלס אלמלו",country:"הולנד"},{team:"גו אהד איגלס",country:"הולנד"},{team:"לאריסה",country:"יוון"},{team:"לאנס",country:"צרפת"},{team:"מץ",country:"צרפת"},{team:"בסטיה",country:"צרפת"},{team:"דנקרק",country:"צרפת"},{team:"בודוצ'נוסט פודגוריצה",country:"מונטנגרו"},{team:"דברצן ו.ס.ק.",country:"הונגריה"},{team:"לילסטרום",country:"נורווגיה"},{team:"פרדריקסטאד",country:"נורווגיה"},{team:"ברונדבי",country:"דנמרק"},{team:"מיטיולן",country:"דנמרק"},{team:"גרויטר פירט",country:"גרמניה"},{team:"הולשטיין קיל",country:"גרמניה"},{team:"יגילוניה ביאליסטוק",country:"פולין"},{team:"גאקאאס קטוביצה",country:"פולין"},{team:"היברניאן",country:"סקוטלנד"},{team:"סנט מירן",country:"סקוטלנד"},{team:"אברדין",country:"סקוטלנד"},
                {team:"קאיראט אלמטי",country:"קזחסטן"},{team:"ריאל ואיאדוליד קלוב דה פוטבול",country:"ספרד"},{team:"דפורטיבו אלאבס",country:"ספרד"},{team:"קרבאך פוטבול קלאב",country:"אזרבייג'ן"},{team:"דנדי יונייטד",country:"סקוטלנד"},{team:"פוליסיה ז'יטומיר",country:"אוקראינה"},{team:"אולימפיה ליובליאנה",country:"סלובניה"},{team:"בְּרוֹנְדְבִּי אידראטספוינין",country:"דנמרק"},{team:"פיורנטינה",country:"איטליה"},{team:"מועדון הכדורגל ז'ירונה",country:"ספרד"},{team:"אלצ'ה",country:"ספרד"},
                {team:"לודוגורץ ראזגרד",country:"בולגריה"},{team:"רובין קאזן",country:"רוסיה"},{team:"אלמניה אאכן",country:"גרמניה"},{team:"פ.צ מגדבורג",country:"גרמניה"},{team:"איפסוויץ' טאון",country:"אנגליה"},{team:"גטבורג",country:"שוודיה"},{team:"וידאוטון",country:"הונגריה"},{team:"בורודו",country:"צרפת"},{team:"לאציו",country:"איטליה"},{team:"שַחְטָאר דוֹנֵצְק",country:"אוקראינה"},{team:"גראסהופרס",country:"שוויץ"},{team:"פולהאם",country:"אנגליה"},{team:"נוטינגהאם פורסט",country:"אנגליה"}
            ],
            hard: [
                {team:"דונקסטר רוברס",country:"אנגליה"},{team:"פורט וייל",country:"אנגליה"},{team:"ויקם וונדררס",country:"אנגליה"},{team:"זולטה ורכם",country:"בלגיה"},{team:"דנדר",country:"בלגיה"},{team:"הלמונד ספורט",country:"הולנד"},{team:"פ.צ אמן",country:"הולנד"},{team:"קיפסיה",country:"יוון"},{team:"לבדיאקוס",country:"יוון"},{team:"סנטה קלרה",country:"פורטוגל"},{team:"רודז",country:"צרפת"},{team:"אינטר טורקו",country:"פינלנד"},{team:"האמארקאמארטנה",country:"נורווגיה"},{team:"גנצ'לרבירלי",country:"טורקיה"},{team:"פרויסן מינסטר",country:"גרמניה"},{team:"הפנרפיירדיר",country:"איסלנד"},{team:"קורונה קיילצה",country:"פולין"},{team:"פ.צ. ואדוץ",country:"ליכטנשטיין"},{team:"מועדון הכדורגל אוניברסיטת קראיובה",country:"רומניה"},{team:"שמרוק רוברס",country:"אירלנד"},{team:"טורפדו כותאיסי",country:"גאורגיה"},{team:"אוניון דפורטיבו אלמריה",country:"ספרד"},{team:"מועדון הכדורגל אלמיירה סיטי",country:"הולנד"},{team:"אלבסטה באלומפיה",country:"ספרד"},{team:"קולטורל ודפורטיבה לאונסה",country:"ספרד"},{team:"דפורטיבו מיראנדס",country:"ספרד"},{team:"סוסיאדד דפורטיבה וֶסְקָה",country:"ספרד"},{team:"דניפרו",country:"אוקראינה"},{team:"סטאד ריימס",country:"צרפת"},{team:"סנט אטיין",country:"צרפת"},{team:"בוכום",country:"גרמניה"},{team:"פאדרבורן",country:"גרמניה"},{team:"אלברסברג",country:"גרמניה"},{team:"פורטונה דיסלדורף",country:"גרמניה"},{team:"פורטונה סיטארד",country:"הולנד"},{team:"אינגולשטאדט 04",country:"גרמניה"},{team:"אנרגי קוטבוס",country:"גרמניה"},{team:"יאן רגנסבורג",country:"גרמניה"},{team:"קרלסרוהה",country:"גרמניה"},{team:"אוסנבריק",country:"גרמניה"},{team:"אודנסה בולקלוב",country:"דנמרק"},{team:"ראנס",country:"דנמרק"},{team:"אוֹרֶנבּוּרג",country:"רוסיה"}
            ]
        };

        let lastUsed = JSON.parse(localStorage.getItem('lastPlayedTeams')) || [];
        let currentGameQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let timerInterval;
        let questionStartTime;
        
       function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        let isFinished = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSuccess() { playTone(600, 'sine', 0.2); }
        function playFailGeneral() { playTone(200, 'sawtooth', 0.6); setTimeout(() => playTone(150, 'sawtooth', 0.6), 150); }
        function playEpicFail() { playTone(100, 'square', 1, 0.15); playTone(110, 'square', 1, 0.1); }
        function playWinGame() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.6), i * 150)); }

        function cleanText(text) {
            return text.replace(/['’]/g, '').trim();
        }

        function getSmartQuestions(level, count) {
            let pool = allQuestions[level].filter(q => !lastUsed.includes(q.team));
            if (pool.length < count) { pool = [...allQuestions[level]]; lastUsed = []; }
            return pool.sort(() => Math.random() - 0.5).slice(0, count);
        }

        function calculatePoints(index, teamName = "") {
            const pointsMap = { 0:1, 1:1, 2:3, 3:3, 4:5, 5:5, 6:9, 7:10, 8:12 };
            let pts = (index in pointsMap) ? pointsMap[index] : 12 + ((index - 8) * 3);
            if (["אינטר טורקו", "רודז", "זולטה ורכם", "סנט מירן"].includes(teamName)) {
                pts += 1;
            }
            return pts;
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const q1 = shuffleArray([...allQuestions.easy]).slice(0, 7);
            const q2 = shuffleArray([...allQuestions.medium]).slice(0, 6);
            const q3 = shuffleArray([...allQuestions.hard]).slice(0, 4);
            
            currentGameQuestions = [...q1, ...q2, ...q3];
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            score = 0;
            currentIndex = 0;
            isFinished = false;
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= currentGameQuestions.length) { isFinished = true; gameOver("הגעת לסוף!"); return; }
            const q = currentGameQuestions[currentIndex];
            document.getElementById('team-name').innerText = q.team;
            const cleanA = q.country.replace(/[\s\']+/g, '');
            document.getElementById('letter-hint').innerText = `(${cleanA.length} אותיות)`;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
            let levelText = currentIndex < 7 ? "רמה: קל" : (currentIndex < 13 ? "רמה: בינוני" : "רמה: קשה");
            document.getElementById('difficulty-label').innerText = levelText;
            document.getElementById('score-display').innerText = `ניקוד: ${score} | שאלה ${currentIndex + 1} מתוך 17 | שווי: ${calculatePoints(currentIndex, q.team)} נק'`;
            startTimer(currentIndex < 7 ? 20 : (currentIndex < 13 ? 15 : 10));
            questionStartTime = Date.now();
        }

        function startTimer(time) {
            clearInterval(timerInterval);
            let timeLeft = time;
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
               if (timeLeft <= 0) {
                // רישום הטעות ב-Firebase לפני סיום המשחק
                const q = currentGameQuestions[currentIndex];
                database.ref('wrong_answers').push({
                    team: q.team,
                    country: q.country,
                    reason: "timeout",
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                
                gameOver("נגמר הזמן!");
            }
            }, 1000);
        }

        document.getElementById('answer-input').addEventListener('input', (e) => {
            const userAnswer = cleanText(e.target.value);
            const q = currentGameQuestions[currentIndex];
            const correctAnswer = cleanText(q.country);
            if (userAnswer === correctAnswer) {
                playSuccess();
                let ptsToAdd = calculatePoints(currentIndex, q.team);
                if (questionStartTime && (Date.now() - questionStartTime) < 5000) {
                    ptsToAdd += 1;
                }
                score += ptsToAdd;
                currentIndex++;
                setTimeout(showQuestion, 200);
            }
        });

        function gameOver(reason) {
            clearInterval(timerInterval);
            const q = currentGameQuestions[currentIndex];
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            if (isFinished) playWinGame();
            else if (currentIndex < 7) playEpicFail();
            else playFailGeneral();
            
            if (currentIndex === 0 && reason !== "נגמר הזמן!") {
                document.getElementById('end-reason').innerText = "לא טוב דודו, תמחק!";
            } else {
                document.getElementById('end-reason').innerText = reason;
            }
            document.getElementById('correct-answer-reveal').innerText = (q && !isFinished) ? `המדינה הנכונה הייתה: ${q.country}` : "";
            document.getElementById('end-score').innerText = score;
            document.getElementById('end-rank-msg').innerText = getRankMessage(score);
        }

      function getRankMessage(s) {
            if (currentIndex === 0) return "לא טוב דודו, תמחק!"; 
            if (isFinished) return "הגעת לסוף, מכאן זה רק לשמוע את השירים של פיפא 98, ללכת למשחק בליגה השלישית בפורטוגל, להגיע לסיבוב הראשון של הגביע הגרמני ולהתרגש משמות כמו נאק ברדה, צסקא סופיה, פלורה טאלין וראסינג סנטנדר.";
            if (s >= 1 && s <= 5) return "אתה צופה בכדורגל אבל כנראה שרק בליגת האלופות.";
            if (s > 5 && s <= 9) return "הליגה האירופית קטנה עליך, יאללה בוא, נוסעים לראות ליגה לאומית.";
            if (s > 9 && s <= 14) return "אתה רוי מקאי, אתה רונאלד דה בור, אתה אגדה הולנדית של שנות ה-2000, בוא זריז יש משחק של טוונטה נגד ויטסה.";
            if (s > 14 && s <= 19) return "אתה אגדת כדורגל אירופית, אתה אורח כבוד אצל תיירי הנרי ודל פיירו רוצה ממך טיפים, אתה פאגינג גאון.";
            if (s > 19 && s <= 30) return "אתה אגדה חייה, אתה רונאלדו השמן לפני שהיה כריסטיאנו, את דודו אוואט בלה ליגה ואתה בלתי נגמר.";
            if (s > 30 && s <= 40) return "אתה הפועל תל אביב בגביע אופ\"א עברת כל כך הרבה שאף אחד כבר לא יודע אם היריבה הבאה קיימת.";
            if (s > 40 && s <= 59) return "בטח אתה אומר שהכל היה סטאם, יאפ סטאם.";
            if (s >= 60 && s < 90) return "אתה כל כך גדול שהדחת קבוצה מאיסלנד ממוקדמות הליגה האזורית.";
            if (s >= 90) return "ברכות! אתה רונאלדיניו, הגעת כל כך רחוק במשחק שלאף אחד לא מובן איך לא סיימת מקום ראשון, זה הזמן לנסות שוב.";
            return "";
        }

        // --- פונקציית שליחת התוצאה ל-Realtime Database ---
        function submitScore() {
            const name = document.getElementById("player-name-input").value.trim();
            const btn = document.getElementById("submit-btn");

            if (!name) {
                alert("נא להזין שם");
                return;
            }

            btn.disabled = true;
            btn.innerText = "שומר...";

            const leaderboardRef = database.ref('leaderboard');
            const newScoreRef = leaderboardRef.push();
            
            newScoreRef.set({
                name: name,
                score: score,
                date: new Date().toISOString()
            })
            .then(() => {
                window.location.href = "leaderboard.html";
            })
            .catch((error) => {
                alert("הייתה בעיה בשמירה לשרת.");
                console.error(error);
                btn.disabled = false;
                btn.innerText = "שלח תוצאה";
            });
        }
    </script>
